name: CI

on: [push, pull_request]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: shellcheck bin/ntp-tools lib/ntp_common.sh lib/commands/*.sh

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build bundle
        run: bash build.sh
      - name: Smoke test
        run: |
          ./dist/ntp-tools --version
          ./dist/ntp-tools --help
