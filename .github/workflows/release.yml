name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 2.0.1)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format. Expected x.y.z"
            exit 1
          fi


      - name: Bump VERSION
        run: |
          sed -i 's/^VERSION=".*"/VERSION="${{ github.event.inputs.version }}"/' lib/ntp_common.sh

      - name: Update CHANGELOG
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          VERSION="${{ github.event.inputs.version }}"
          DATE=$(date +%Y-%m-%d)

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges | grep -v "^- chore: release")
          else
            COMMITS="- Initial release"
          fi
          [ -z "$COMMITS" ] && COMMITS="- Minor changes and improvements"

          NEW_ENTRY="## v${VERSION} - ${DATE}\n\n${COMMITS}\n"

          if [ -f CHANGELOG.md ]; then
            FIRST=$(grep -n "^## " CHANGELOG.md | head -1 | cut -d: -f1)
            if [ -n "$FIRST" ]; then
              head -n $((FIRST - 1)) CHANGELOG.md > /tmp/cl.md
              printf "${NEW_ENTRY}\n" >> /tmp/cl.md
              tail -n +${FIRST} CHANGELOG.md >> /tmp/cl.md
              mv /tmp/cl.md CHANGELOG.md
            else
              printf "${NEW_ENTRY}\n" >> CHANGELOG.md
            fi
          else
            printf "# Changelog\n\n${NEW_ENTRY}\n" > CHANGELOG.md
          fi

      - name: Build bundle
        run: bash build.sh

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/ntp_common.sh CHANGELOG.md
          git commit -m "chore: release v${{ github.event.inputs.version }}"
          git tag "v${{ github.event.inputs.version }}"
          git push origin HEAD --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "v${{ github.event.inputs.version }}"
          generate_release_notes: true
          files: dist/ntp-tools
