name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 2.0.1)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format. Expected x.y.z"
            exit 1
          fi

      - name: Check if first release
        id: first
        run: |
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          [ -z "$PREV" ] && echo "value=true" >> $GITHUB_OUTPUT || echo "value=false" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: sudo apt-get install -y debhelper dput-ng devscripts

      - name: Bump VERSION
        run: |
          sed -i 's/^VERSION=".*"/VERSION="${{ github.event.inputs.version }}"/' lib/ntp_common.sh

      - name: Update debian/changelog
        run: |
          VERSION="${{ github.event.inputs.version }}"
          DATE=$(date -R)
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            CHANGES=$(git log "${PREV}..HEAD" --pretty=format:"  * %s" | grep -v "chore: release" | head -20)
          fi
          [ -z "$CHANGES" ] && CHANGES="  * Release v${VERSION}"
          printf 'ntp-tools (%s-1) noble; urgency=medium\n\n%s\n\n -- TheHuman00 <thehuman00@inutile.pro>  %s\n\n' \
            "$VERSION" "$CHANGES" "$DATE" | cat - debian/changelog > /tmp/cl.tmp
          mv /tmp/cl.tmp debian/changelog

      - name: Build bundle
        run: bash build.sh

      - name: Create upstream tarball
        run: |
          tar --exclude='.git' --exclude='debian' --exclude='dist' \
            -czf ../ntp-tools_${{ github.event.inputs.version }}.orig.tar.gz .

      - name: Import GPG subkey and build source package
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          printf 'allow-loopback-pinentry\ndefault-cache-ttl 86400\nmax-cache-ttl 86400\n' > ~/.gnupg/gpg-agent.conf
          printf 'pinentry-mode loopback\nbatch\n' > ~/.gnupg/gpg.conf
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --passphrase "$GPG_PASSPHRASE" --pinentry-mode loopback --import
          echo "$GPG_KEY_ID:6:" | gpg --import-ownertrust
          gpgconf --kill gpg-agent
          gpgconf --launch gpg-agent
          echo "test" | gpg --batch --passphrase "$GPG_PASSPHRASE" --pinentry-mode loopback \
            --armor --sign --local-user "$GPG_KEY_ID" > /dev/null 2>&1
          dpkg-buildpackage -S -sa -k"$GPG_KEY_ID"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/ntp_common.sh debian/changelog
          git commit -m "chore: release v${{ github.event.inputs.version }}"
          git tag "v${{ github.event.inputs.version }}"
          git push origin HEAD --tags

      - name: Create GitHub Release (first)
        if: steps.first.outputs.value == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "v${{ github.event.inputs.version }}"
          body: "Initial release"
          files: dist/ntp-tools

      - name: Create GitHub Release
        if: steps.first.outputs.value == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "v${{ github.event.inputs.version }}"
          generate_release_notes: true
          files: dist/ntp-tools

      - name: Upload to Launchpad PPA
        run: dput ppa:thehuman00/ntp-tools ../ntp-tools_${{ github.event.inputs.version }}-1_source.changes
